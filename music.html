<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Music Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .btn {
            display: block;
            width: 90%;
            max-width: 300px;
            margin: 10px auto;
            padding: 15px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
        }

        .btn:hover {
            background: #444;
        }

        #status {
            margin-top: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>

<h1>Music Player</h1>

<button class="btn" onclick="playCliqhop()">Play Cliqhop</button>
<button class="btn" onclick="playGrooveSalad()">Play Groove Salad</button>

<div id="status">Select a track to play</div>

<audio id="player" controls style="width:90%; max-width:300px; margin-top:20px;"></audio>

<script type="text/javascript">

    function tryServers(base, callback) {
        var servers = ["ice1", "ice2", "ice3", "ice4", "ice5", "ice6"];
        var index = 0;

        function attempt() {
            if (index >= servers.length) {
                callback(null); // all failed
                return;
            }

            var url = "https://" + servers[index] + ".somafm.com/" + base;
            index++;

            var audio = document.getElementById("player");
            audio.src = url;

            var playPromise = audio.play();

            if (playPromise && playPromise.then) {
                playPromise.then(function () {
                    callback(url); // success
                }).catch(function () {
                    attempt(); // try next server
                });
            } else {
                // Older Safari may not return a promise
                callback(url);
            }
        }

        attempt();
    }

    function playCliqhop() {
        var status = document.getElementById("status");
        status.innerHTML = "Trying servers for Cliqhop…";

        tryServers("cliqhop-128-mp3", function (url) {
            if (url) {
                status.innerHTML = "Playing: " + url;
            } else {
                status.innerHTML = "Unable to play this stream.";
            }
        });
    }

    function playGrooveSalad() {
        var status = document.getElementById("status");
        status.innerHTML = "Trying servers for Groove Salad…";

        tryServers("groovesalad-256-mp3", function (url) {
            if (url) {
                status.innerHTML = "Playing: " + url;
            } else {
                status.innerHTML = "Unable to play this stream.";
            }
        });
    }

</script>

</body>
</html>
