<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Music Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .btn {
            display: block;
            width: 90%;
            max-width: 300px;
            margin: 10px auto;
            padding: 15px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
        }

        .btn:hover {
            background: #444;
        }

        #status {
            margin-top: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>

<h1>Music Player</h1>

<button class="btn" onclick="playTrack('http://ice1.somafm.com/cliqhop-128-mp3')">Cliqhop</button>
<button class="btn" onclick="playTrack('http://ice1.somafm.com/defcon-128-mp3')">Defcon</button>
<button class="btn" onclick="playTrack('http://ice1.somafm.com/digitalis-128-mp3')">Digitalis</button>
<button class="btn" onclick="playTrack('https://somafm.com/m3u/groovesalad130.m3u')">Groove Salad</button>
<button class="btn" onclick="playTrack('https://somafm.com/m3u/gsclassic130.m3u')">GS Classic</button>
<button class="btn" onclick="playTrack('http://ice1.somafm.com/specials-128-mp3')">Specials</button>
<button class="btn" onclick="playTrack('http://ice1.somafm.com/vaporwaves-128-mp3')">Vaporwaves</button>
<button class="btn" onclick="playTrack('http://ice1.somafm.com/post_metal_radio-128-mp3')">Post Metal Radio</button>
<button class="btn" onclick="playTrack('tommy_guerrero_daio.xspf')">Tommy Guerrero</button>

<div id="status">Select a track to play</div>

<!-- Hidden audio element -->
<audio id="player" controls style="width:90%; max-width:300px; margin-top:20px;"></audio>

<script type="text/javascript">
    function playTrack(filename) {
        var audio = document.getElementById("player");
        var status = document.getElementById("status");

        // Build path to music folder
        var path = "music/" + filename;

        // Set audio source
        audio.src = path;

        // Try to play
        var playPromise = audio.play();

        if (playPromise && playPromise.then) {
            playPromise.then(function () {
                status.innerHTML = "Playing: " + filename;
            }).catch(function () {
                status.innerHTML = "Unable to play this file on this device.";
            });
        } else {
            status.innerHTML = "Playing: " + filename;
        }
    }
</script>

</body>
</html>
