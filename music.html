<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Music Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .btn {
            display: block;
            width: 90%;
            max-width: 300px;
            margin: 10px auto;
            padding: 15px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
        }

        .btn:hover {
            background: #444;
        }

        #status {
            margin-top: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>

<h1>Music Player</h1>

<button class="btn" onclick="playTrack('http://ice6.somafm.com/cliqhop-128-mp3')">
    Cliqhop IDM
</button>

<button class="btn" onclick="playTrack('https://ice6.somafm.com/groovesalad-256-mp3')">
    Groove Salad
</button>

<div id="status">Select a track to play</div>

<audio id="player" controls style="width:90%; max-width:300px; margin-top:20px;"></audio>

<script type="text/javascript">
    function playTrack(url) {
        var audio = document.getElementById("player");
        var status = document.getElementById("status");

        audio.src = url;

        var playPromise = audio.play();

        if (playPromise && playPromise.then) {
            playPromise.then(function () {
                status.innerHTML = "Playing: " + url;
            }).catch(function () {
                status.innerHTML = "Unable to play this stream on this device.";
            });
        } else {
            status.innerHTML = "Playing: " + url;
        }
    }
</script>

</body>
</html>
