<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Greek Radio Player + GPS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            padding: 10px;
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        #player {
            width: 95%;
            max-width: 600px;
            margin: 10px auto 10px auto;
            display: block;
        }

        #volumeControl {
            width: 90%;
            max-width: 400px;
            margin: 10px auto 20px auto;
        }

        .tile-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tile {
            width: 30%;
            margin: 1%;
            background: #222;
            border-radius: 12px;
            padding: 10px;
            box-sizing: border-box;
            cursor: pointer;
        }

        .tile:hover {
            background: #333;
        }

        .tile img {
            width: 100%;
            height: 100px;
            object-fit: contain;
            margin-bottom: 8px;
        }

        .tile span {
            display: block;
            font-size: 1em;
            padding-bottom: 5px;
        }

        #stopBtn {
            margin-top: 15px;
            padding: 15px 30px;
            background: #660000;
            border: 1px solid #aa0000;
            border-radius: 10px;
            color: #fff;
            font-size: 1.2em;
            cursor: pointer;
        }

        #stopBtn:hover {
            background: #880000;
        }

        #status {
            margin-top: 15px;
            color: #aaa;
        }

        #gpsBox {
            margin-top: 25px;
            padding: 15px;
            background: #222;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

<h2>Greek Radio Player</h2>

<audio id="player" controls></audio>

<input id="volumeControl" type="range" min="0" max="1" step="0.01" value="1">

<div class="tile-grid">

    <div class="tile" onclick="playStation('http://sportfm.live24.gr/sportfm7712')">
        <img src="i_turn0image151">
        <span>Sport FM 94.6</span>
    </div>

    <div class="tile" onclick="playStation('http://stream.radiojar.com/melodia992')">
        <img src="i_turn0image1">
        <span>Melodia 99.2</span>
    </div>

    <div class="tile" onclick="playStation('http://stream.radiojar.com/enlefko877')">
        <img src="i_turn0image121">
        <span>En Lefko 87.7</span>
    </div>

    <div class="tile" onclick="playStation('http://stream.radiojar.com/pepper966')">
        <img src="i_turn0image31">
        <span>Pepper 96.6</span>
    </div>

    <div class="tile" onclick="playStation('http://rockfm.live24.gr/rockfm')">
        <img src="i_turn0image61">
        <span>Rock FM 96.9</span>
    </div>

    <div class="tile" onclick="playStation('http://stream.radiojar.com/red963')">
        <img src="i_turn0image211">
        <span>Red FM 96.3</span>
    </div>

    <div class="tile" onclick="playStation('http://flyfm.gr:8000/stream')">
        <img src="i_turn0image121">
        <span>Fly FM</span>
    </div>

    <div class="tile" onclick="playStation('http://eco.onestreaming.com:8032/stream')">
        <img src="i_turn0image91">
        <span>Mousiko Kanali</span>
    </div>

</div>

<button id="stopBtn" onclick="stopPlayback()">STOP</button>

<div id="status">Select a station</div>

<div id="gpsBox">
    <div>Speed: <span id="speed">--</span> km/h</div>
    <div>Lat: <span id="lat">--</span></div>
    <div>Lon: <span id="lon">--</span></div>
</div>

<script type="text/javascript">

    function playStation(url) {
        var audio = document.getElementById("player");
        audio.src = url;

        var status = document.getElementById("status");
        status.innerHTML = "Loading…";

        var playPromise = audio.play();

        if (playPromise && playPromise.then) {
            playPromise.then(function () {
                status.innerHTML = "Playing: " + url;
            }).catch(function () {
                status.innerHTML = "Unable to play this stream.";
            });
        } else {
            status.innerHTML = "Playing: " + url;
        }
    }

    function stopPlayback() {
        var audio = document.getElementById("player");
        audio.pause();
        audio.src = "";
        document.getElementById("status").innerHTML = "Stopped";
    }

    document.getElementById("volumeControl").addEventListener("input", function () {
        var audio = document.getElementById("player");
        audio.volume = this.value;
    });

    function updateGPS(position) {
        var lat = position.coords.latitude;
        var lon = position.coords.longitude;
        var speed = position.coords.speed;

        if (speed === null) speed = 0;

        var kmh = (speed * 3.6).toFixed(1);

        document.getElementById("lat").innerHTML = lat.toFixed(6);
        document.getElementById("lon").innerHTML = lon.toFixed(6);
        document.getElementById("speed").innerHTML = kmh;
    }

    function gpsError(err) {
        document.getElementById("speed").innerHTML = "--";
        document.getElementById("lat").innerHTML = "--";
        document.getElementById("lon").innerHTML = "--";
    }

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
            updateGPS,
            gpsError,
            { enableHighAccuracy: true, maximumAge: 0 }
        );
    }

</script>

</body>
</html>
