<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Car Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/promise-polyfill/dist/polyfill.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/whatwg-fetch/dist/fetch.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/core-js-bundle/minified.js"></script>
</head>

<body>

<div id="debug">
    <h3>DEBUG PANEL</h3>
    <pre id="debugText">Waiting for GPS...</pre>
</div>

<div id="speed">0 km/h</div>

<div id="screen-map" class="screen active">
    <div id="map"></div>
</div>

<div id="screen-radio" class="screen">
    <h1>Αναλογικό Ραδιόφωνο</h1>

    <div id="tuner">
        <div id="scale">
            <div id="indicator"></div>
        </div>
    </div>

    <div id="radio-info">
        <div id="freqDisplay">88.1 MHz</div>
        <div id="stationName">Fly FM</div>
    </div>

    <div id="radio-display">
        <img id="stationLogo" src="logos/flyfm.png" alt="Logo">
        <div id="songInfo">Loading...</div>
    </div>

    <div id="radio-controls">
        <button class="big-btn" onclick="prevStation()">◀ Προηγούμενος</button>
        <button class="big-btn" onclick="nextStation()">▶ Επόμενος</button>
    </div>
</div>

<div id="screen-music" class="screen">
    <h1>Μουσική</h1>
</div>

<div id="screen-settings" class="screen">
    <h1>Ρυθμίσεις</h1>
</div>

<div id="controls">
    <button class="big-btn" onclick="showScreen('map')">Χάρτης</button>
    <button class="big-btn" onclick="showScreen('radio')">Ραδιόφωνο</button>
    <button class="big-btn" onclick="showScreen('music')">Μουσική</button>
    <button class="big-btn" onclick="showScreen('settings')">Ρυθμίσεις</button>
</div>

<script src="app.js"></script>

</body>
</html>
