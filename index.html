<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Car Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      // your JS here, Babel will transpile it for old Safari
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css">
        <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/promise-polyfill/dist/polyfill.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/whatwg-fetch/dist/fetch.umd.js"></script>
    </script>

</head>
<body>
<div id="speed">0 km/h</div>
<div id="map"></div>
    <div id="screen-map" class="screen active">
    <div id="map"></div>
</div>

<div id="screen-radio" class="screen">
    <h1>Ραδιόφωνο</h1>
</div>

<div id="screen-music" class="screen">
    <h1>Μουσική</h1>
</div>

<div id="screen-settings" class="screen">
    <h1>Ρυθμίσεις</h1>
</div>
<div id="controls">
    <button class="big-btn" onclick="showScreen('map')">Χάρτης</button>
    <button class="big-btn" onclick="showScreen('radio')">Ραδιόφωνο</button>
    <button class="big-btn" onclick="showScreen('music')">Μουσική</button>
    <button class="big-btn" onclick="showScreen('settings')">Ρυθμίσεις</button>
</div>

<script src="app.js"></script>
</body>
</html>
